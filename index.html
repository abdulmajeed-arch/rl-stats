<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWIS Rocket League Tournament</title>
    <style>
        :root {
            --bg: #05080a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #00e5ff;
            --text: #e0e6ed;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #003366 0%, #05080a 100%);
            border-bottom: 1px solid var(--border);
        }

        h1 { font-size: 2.8rem; margin: 0; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* Latest Match Section */
        .latest-match {
            background: linear-gradient(90deg, rgba(0,229,255,0.1) 0%, rgba(0,0,0,0) 100%);
            border: 1px solid var(--accent);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 50px;
            text-align: center;
        }

        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .category-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .category-header h2 { margin: 0; font-size: 1.2rem; color: var(--accent); }

        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        th { text-align: left; color: #888; font-weight: 400; padding-bottom: 10px; }
        td { padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); }

        .rank { color: var(--accent); font-weight: bold; width: 30px; }
        .score { text-align: right; font-weight: bold; color: #fff; }
        .team-tag { font-size: 0.75rem; color: #666; display: block; }
    </style>
</head>
<body>

<header>
    <h1>NWIS Rocket League</h1>
    <p>Tournament Leaderboards • Season 1</p>
</header>

<div class="container">
    
    <section class="latest-match">
        <h2 style="margin-top:0; color: var(--accent);">Latest Match Results</h2>
        <div style="display: flex; justify-content: space-around; align-items: center; font-size: 1.5rem;">
            <div>Team A<br><span style="font-size: 3rem;">-</span></div>
            <div style="color: var(--accent);">VS</div>
            <div>Team B<br><span style="font-size: 3rem;">-</span></div>
        </div>
        <p style="color: #888; margin-bottom: 0;">Stats will be updated after the next game.</p>
    </section>

    <div class="category-grid">
        <div class="category-section">
            <div class="category-header">
                <h2>Top Scorers</h2>
                <span>⚽</span>
            </div>
            <table id="goals-table">
                <thead><tr><th>Player</th><th style="text-align:right;">Goals</th></tr></thead>
                <tbody id="goals-body"></tbody>
            </table>
        </div>

        <div class="category-section">
            <div class="category-header">
                <h2>Top Assisters</h2>
                <span>🤝</span>
            </div>
            <table id="assists-table">
                <thead><tr><th>Player</th><th style="text-align:right;">Assists</th></tr></thead>
                <tbody id="assists-body"></tbody>
            </table>
        </div>

        <div class="category-section">
            <div class="category-header">
                <h2>Top Savers</h2>
                <span>🛡️</span>
            </div>
            <table id="saves-table">
                <thead><tr><th>Player</th><th style="text-align:right;">Saves</th></tr></thead>
                <tbody id="saves-body"></tbody>
            </table>
        </div>

        <div class="category-section">
            <div class="category-header">
                <h2>Top Demolitions</h2>
                <span>💥</span>
            </div>
            <table id="demos-table">
                <thead><tr><th>Player</th><th style="text-align:right;">Demos</th></tr></thead>
                <tbody id="demos-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // DATA SOURCE: Update these values to refresh the site
    const players = [
        { name: "Alpha", team: "Blue Wings", g: 25, a: 12, s: 8, d: 5 },
        { name: "Bravo", team: "Red Rockets", g: 14, a: 18, s: 5, d: 30 },
        { name: "Charlie", team: "Green Gears", g: 5, a: 7, s: 31, d: 12 },
        { name: "Delta", team: "Blue Wings", g: 8, a: 5, s: 4, d: 56 },
        { name: "Echo", team: "Red Rockets", g: 19, a: 11, s: 14, d: 2 }
    ];

    function fillTable(id, key) {
        const body = document.getElementById(id);
        const sorted = [...players].sort((a,b) => b[key] - a[key]);
        
        sorted.forEach((p, index) => {
            body.innerHTML += `
                <tr>
                    <td>
                        <span class="rank">#${index+1}</span> ${p.name}
                        <span class="team-tag">${p.team}</span>
                    </td>
                    <td class="score">${p[key]}</td>
                </tr>
            `;
        });
    }

    // Initialize all tables
    fillTable('goals-body', 'g');
    fillTable('assists-body', 'a');
    fillTable('saves-body', 's');
    fillTable('demos-body', 'd');
</script>

</body>
</html>
