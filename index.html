<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket League Tournament Stats</title>
    <style>
        /* DESIGN & COLORS */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-blue: #58a6ff;
            --accent-orange: #f78166;
            --text-main: #c9d1d9;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 50px 0;
            background: linear-gradient(180deg, #1f6feb 0%, #0d1117 100%);
            text-align: center;
            border-bottom: 1px solid #30363d;
        }

        h1 { margin: 0; font-size: 2.5rem; color: white; text-transform: uppercase; letter-spacing: 2px; }
        
        .container { width: 90%; max-width: 1100px; padding: 40px 0; }

        /* TOP 4 STAT CARDS */
        .top-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent-blue); }
        .card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #8b949e; text-transform: uppercase; }
        .card .name { font-size: 1.4rem; font-weight: bold; color: white; margin-bottom: 5px; }
        .card .value { font-size: 2.2rem; font-weight: 800; color: var(--accent-blue); }

        /* THE LEADERBOARD TABLE */
        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #30363d;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead { background: #21262d; }
        th { padding: 15px 20px; color: #8b949e; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 15px 20px; border-top: 1px solid #30363d; font-size: 1rem; }
        
        .player-cell { font-weight: bold; color: white; }
        .team-tag { color: #8b949e; font-size: 0.9rem; }
        .stat-cell { font-family: 'Courier New', monospace; font-weight: bold; color: var(--accent-blue); }

        tr:hover { background: #1c2128; }
    </style>
</head>
<body>

    <header>
        <h1>🏆 School Rocket League Open</h1>
        <p>Official Tournament Leaderboard</p>
    </header>

    <div class="container">
        <div class="top-row">
            <div class="card">
                <h3>Top Scorer</h3>
                <div class="name" id="top-goals-name">-</div>
                <div class="value" id="top-goals-val">0</div>
            </div>
            <div class="card">
                <h3>Top Assister</h3>
                <div class="name" id="top-assists-name">-</div>
                <div class="value" id="top-assists-val">0</div>
            </div>
            <div class="card">
                <h3>Top Saver</h3>
                <div class="name" id="top-saves-name">-</div>
                <div class="value" id="top-saves-val">0</div>
            </div>
            <div class="card">
                <h3>The Enforcer</h3>
                <div class="name" id="top-demos-name">-</div>
                <div class="value" id="top-demos-val">0</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Team</th>
                        <th>Goals</th>
                        <th>Assists</th>
                        <th>Saves</th>
                        <th>Demos</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        /* HOW TO UPDATE STATS:
           Just edit the names and numbers in the list below. 
           The website will automatically recalculate the leaders!
        */
        const playerData = [
            { name: "Alpha", team: "Blue Wings", g: 14, a: 5, s: 8, d: 12 },
            { name: "Bravo", team: "Red Rockets", g: 8, a: 12, s: 4, d: 3 },
            { name: "Charlie", team: "Green Gears", g: 4, a: 2, s: 19, d: 7 },
            { name: "Delta", team: "Blue Wings", g: 19, a: 3, s: 2, d: 25 },
            { name: "Echo", team: "Red Rockets", g: 6, a: 15, s: 9, d: 5 }
        ];

        function loadStats() {
            const tableBody = document.getElementById('table-body');
            
            // 1. Sort by goals for the main list
            const sorted = [...playerData].sort((a, b) => b.g - a.g);

            // 2. Build the table
            sorted.forEach(p => {
                tableBody.innerHTML += `
                    <tr>
                        <td class="player-cell">${p.name}</td>
                        <td class="team-tag">${p.team}</td>
                        <td class="stat-cell">${p.g}</td>
                        <td class="stat-cell">${p.a}</td>
                        <td class="stat-cell">${p.s}</td>
                        <td class="stat-cell">${p.d}</td>
                    </tr>
                `;
            });

            // 3. Find the leaders for the cards
            const getLeader = (key) => [...playerData].sort((a, b) => b[key] - a[key])[0];

            const goalLeader = getLeader('g');
            document.getElementById('top-goals-name').innerText = goalLeader.name;
            document.getElementById('top-goals-val').innerText = goalLeader.g;

            const assistLeader = getLeader('a');
            document.getElementById('top-assists-name').innerText = assistLeader.name;
            document.getElementById('top-assists-val').innerText = assistLeader.g; // Corrected to use .a

            const saveLeader = getLeader('s');
            document.getElementById('top-saves-name').innerText = saveLeader.name;
            document.getElementById('top-saves-val').innerText = saveLeader.s;

            const demoLeader = getLeader('d');
            document.getElementById('top-demos-name').innerText = demoLeader.name;
            document.getElementById('top-demos-val').innerText = demoLeader.d;
        }

        window.onload = loadStats;
    </script>
</body>
</html>
